<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 fixed-top">
    <div class="nav-left me-auto">
        <a class="text-white text-decoration-none me-3" href="index.html">Main</a>
        <a class="text-white text-decoration-none me-3" href="index.html#fare">Fare Matrix</a>
        <a class="text-white text-decoration-none me-3" href="confirmation.html">Schedule</a>
        <a class="text-white text-decoration-none" href="#">Help</a>
    </div>

    <div class="nav-right">
        <a href="registration.html" class="btn btn-primary btn-sm">Create Account</a>
    </div>
</nav>

<div class="container d-flex justify-content-center mt-5 mb-5">
    <div class="form-container p-4 shadow bg-light rounded" style="width: 400px;">
        <h2 class="text-center">REGISTRATION</h2>
        <form action="confirmation.html">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control mb-2" required>

            <label class="form-label">Last Name</label>
            <input type="text" class="form-control mb-2" required>

            <div class="row g-2 mb-2">
                <div class="col"><input type="number" class="form-control" placeholder="Age"></div>
                <div class="col"><input type="text" class="form-control" placeholder="Contact Number"></div>
            </div>

            <label class="form-label">Email</label>
            <input type="email" class="form-control mb-2">

            <label class="form-label">Username</label>
            <input type="text" class="form-control mb-2">

            <label class="form-label">Password</label>
            <input type="password" class="form-control mb-3">

            <input type="file" class="form-control mb-3">

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 fixed-bottom">
    Magdayao, Liwag, Roxas, Laysa, Singh | 9-Emerald ©2026
</footer>

</body>
</html>
