<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Project: eSakayMo | Fare Guide</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <header class="navbar navbar-expand-sm navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><img src="logo.png" width="50px"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="registration.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="confirmation.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
                </ul>
                <div class="d-flex">
                    <a href="registration.html" class="btn btn-primary">Create Account</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container-fluid">
        <div class="container bg-warning rounded mt-5 p-4 w-75 shadow">
            <h1 class="text-center">MRT Line 3 Fare Guide</h1>
            <p class="text-center">Enter the total distance of your trip to calculate the cost.</p>
            
            <div id="farematrix" class="bg-white p-4 rounded shadow-sm">
                <h2 class="text-center mb-4">eSakayMo Fare</h2>
                
                <div class="mb-3">
                    <label class="form-label"><h4>Distance of Ride (KM)</h4></label>
                    <input type="number" placeholder="Enter kilometers" class="form-control" id="distance">
                </div>

                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn btn-primary" type="button" onclick="regularFare()">Regular Fare</button>
                    <button class="btn btn-success" type="button" onclick="discountFare()">Discounted Fare</button>
                </div>

                <div class="mt-4 text-center border-top pt-3">
                    <h1 id="fare" class="text-danger">₱0.00</h1>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer navbar navbar-expand-sm navbar-dark bg-dark fixed-bottom py-2 text-white justify-content-center">
        <small>Magdayao, Liwag, Roxas, Laysa, Singh | 9-Emerald &copy; 2026 | <a href="https://www.metrolinemap.com/metro/manila/" class="text-secondary">Source</a></small>
    </footer>

    <script src="proj.js"></script>
</body>
</html>
